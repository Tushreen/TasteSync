<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TasteSync Questionnaire</title>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/questionnaire.css">
    <link rel="stylesheet" href="css/review.css">
</head>

<body>

<div class="page-shell">

  <div class="container">

    <!-- NAV -->
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="questionnaire.html">Questionnaire</a>
        <a href="diary.html">Drink Diary</a>
        <a href="faq.html">FAQ / Contact</a>
        <a href="categories.html">Categories</a>
        <a href="profile.html">Profile</a>
        <a href="auth.html">Login</a>
        <a href="review.html">Review</a>
    </div>

    <!-- HEADER -->
    <h1>Drink Preference Questionnaire</h1>
    <p>Tell us your taste profile to get personalized AI recommendations</p>

    <!-- FORM -->
    <form id="questionnaireForm">

      <div class="form-group">
        <label>Diet</label>
        <select id="diet">
          <option value="Vegetarian">Vegetarian</option>
          <option value="Vegan">Vegan</option>
          <option value="Meat">Meat</option>
          <option value="Seafood">Seafood</option>
        </select>
      </div>

      <div class="form-group">
        <label>Drink Type</label>
        <select id="drinkType">
          <option value="Juice">Juice</option>
          <option value="Soda">Soda</option>
          <option value="Coffee/Tea">Coffee/Tea</option>
          <option value="Smoothies">Smoothies</option>
          <option value="Alcohol">Alcohol</option>
        </select>
      </div>

      <div class="form-group">
        <label>Alcohol Preference</label>
        <select id="alcoholPref">
          <option value="Wine">Wine</option>
          <option value="Sparkling">Sparkling</option>
          <option value="Whiskey">Whiskey</option>
          <option value="Rum">Rum</option>
          <option value="Gin">Gin</option>
          <option value="Vodka">Vodka</option>
          <option value="None">None</option>
        </select>
      </div>

      <div class="form-group">
        <label>Cocktail Type</label>
        <select id="cocktail">
          <option value="Fruity">Fruity</option>
          <option value="Strong">Strong</option>
          <option value="Classic">Classic</option>
          <option value="Refreshing">Refreshing</option>
        </select>
      </div>

      <div class="form-group">
        <label>Style</label>
        <select id="style">
          <option value="On the rocks">On the rocks</option>
          <option value="Neat">Neat</option>
          <option value="Mixed with juice">Mixed with juice</option>
          <option value="Blended">Blended</option>
        </select>
      </div>

      <div class="form-group">
        <label>Flavor Preference</label>
        <select id="flavor">
          <option value="Sweet">Sweet</option>
          <option value="Sour">Sour</option>
          <option value="Bitter">Bitter</option>
          <option value="Fruity">Fruity</option>
          <option value="Spicy">Spicy</option>
        </select>
      </div>

      <div class="form-group">
        <label>Sweet ↔ Bitter Scale (1–5)</label>
        <input type="number" id="scale" min="1" max="5" value="3" />
      </div>

      <div class="form-group">
        <label>Temperature Preference</label>
        <select id="temp">
          <option value="Cold">Cold</option>
          <option value="Room Temperature">Room Temperature</option>
          <option value="Warm">Warm</option>
        </select>
      </div>

      <div class="form-group">
        <label>Description Level</label>
        <select id="desc">
          <option value="Detailed">Detailed</option>
          <option value="Short">Short</option>
          <option value="Minimal">Minimal</option>
        </select>
      </div>

      <button type="submit">Get AI Recommendations</button>

    </form>

    <!-- RESULTS -->
    <div id="results"></div>

  </div>

</div>

<script src="questionnaire.js"></script>
</body>
</html>
